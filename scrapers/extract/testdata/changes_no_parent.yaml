input:
  changes:
    - external_id: vm-1
      config_type: VM
      change_type: diff
      action: Updated
      summary: "disk resized"
    - change_type: RunAction
      action: ScaleUp
      summary: "replicas increased"
assertions:
  - size(changes) == 1
  - changes[0].external_id == 'vm-1'
  - changes[0].config_type == 'VM'
  - summary.changes.scraped == 2
  - summary.changes.skipped == 1
  - size(warnings) == 1
  - warnings[0] == 'change missing external_id'
