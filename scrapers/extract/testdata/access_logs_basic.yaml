input:
  access_logs:
    - external_config_id:
        config_type: Bucket
        external_id: "s3://my-bucket"
      external_user_id: "00000000-0000-0000-0000-000000000001"
      mfa: true
      count: 5
pre_populate:
  configs:
    "Bucket/s3://my-bucket": "00000000-0000-0000-0000-aaaaaaaaaaaa"
assertions:
  - size(access_logs) == 1
  - access_logs[0].config_id == '00000000-0000-0000-0000-aaaaaaaaaaaa'
  - access_logs[0].external_user_id == '00000000-0000-0000-0000-000000000001'
  - access_logs[0].mfa == true
  - access_logs[0].count == 5.0
  - summary.access_logs.scraped == 1
  - summary.access_logs.skipped == 0
