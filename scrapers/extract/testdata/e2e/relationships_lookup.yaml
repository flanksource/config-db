spec:
  full: true
  file:
    - type: App::Service
      id: $.external_id
      paths:
        - fixtures/data/relationships_basic.json
      transform:
        relationship:
          - type:
              value: App::Deployment
            name:
              expr: config.backend_ref
            scope:
              value: all
pre_populate:
  configs:
    - config_class: Deployment
      type: App::Deployment
      name: deploy-web-frontend
      external_id: ["deploy-web-frontend"]
      config: '{"name":"deploy-web-frontend","replicas":3}'
assertions:
  - size(relationships) == 1
