spec:
  full: true
  file:
    - type: TestApp::Environment
      id: $.external_id
      paths:
        - fixtures/data/changes_only_ignore_mapping.json
      transform:
        changes:
          mapping:
            - filter: change_type == 'Heartbeat'
              action: ignore
pre_populate:
  configs:
    - config_class: TestApp::Environment
      type: TestApp::Environment
      external_id: ["env-botswana-ignore"]
      config: '{"name":"env-botswana","region":"africa"}'
assertions:
  - config == null
  - size(changes) == 3
  - changes[0].change_type == 'CycleRun01'
  - changes[1].change_type == 'CycleRun02'
  - changes[2].change_type == 'Heartbeat'
  - changes[2].action == 'ignore'
  - summary.changes.scraped == 3
  - summary.changes.saved == 2
