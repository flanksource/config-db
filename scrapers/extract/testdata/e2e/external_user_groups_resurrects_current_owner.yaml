spec:
  full: true
  file:
    - type: Organization
      class: Organization
      id: $.id
      paths:
        - fixtures/data/external_user_groups_with_membership.json
pre_populate:
  external_users:
    - id: "55555555-5555-5555-5555-555555555555"
      name: "Alice"
      aliases: ["resurrect-alice"]
      user_type: human
      account_id: org-ownership
  external_groups:
    - id: "66666666-6666-6666-6666-666666666666"
      name: "Admins"
      aliases: ["resurrect-admins"]
      group_type: security
      account_id: org-ownership
  external_user_groups:
    - external_user_aliases: ["resurrect-alice"]
      external_group_aliases: ["resurrect-admins"]
      owner: current
      deleted: true
    - external_user_aliases: ["resurrect-alice"]
      external_group_aliases: ["resurrect-admins"]
      owner: other
assertions:
  - size(db.external_user_groups(scraper_id)) == 1
  - size(db.external_user_groups_all(scraper_id)) == 1
  - size(db.external_user_groups(other_scraper_id)) == 1
  - db.external_user_groups(scraper_id)[0].scraper_id == scraper_id
