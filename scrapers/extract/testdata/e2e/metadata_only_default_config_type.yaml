spec:
  full: true
  file:
    - type: RDS
      id: $.external_id
      paths:
        - fixtures/data/metadata_only_no_config_type.json
pre_populate:
  configs:
    - config_class: Database
      type: RDS
      external_id: ["db-instance-1"]
      config: '{"instance_class":"db.t3.medium","max_connections":100}'
assertions:
  - config == null
  - size(changes) == 1
  - changes[0].config_type == 'RDS'
  - changes[0].external_id == 'db-instance-1'
  - changes[0].change_type == 'ScaleUp'
  - summary.changes.scraped == 1
