spec:
  full: true
  file:
    - type: RDS
      id: $.external_id
      paths:
        - fixtures/data/metadata_only_cross_config.json
pre_populate:
  configs:
    - config_class: Database
      type: RDS
      external_id: ["db-instance-1"]
      config: '{"instance_class":"db.t3.medium","max_connections":100}'
    - config_class: Database
      type: Aurora
      external_id: ["db-instance-2"]
      config: '{"engine":"aurora-mysql","replicas":2}'
assertions:
  - config == null
  - size(changes) == 2
  # First change: no config_type in JSON, defaults to file spec type "RDS"
  - changes[0].config_type == 'RDS'
  - changes[0].external_id == 'db-instance-1'
  - changes[0].change_type == 'ParameterChange'
  # Second change: explicit config_type and external_id override defaults
  - changes[1].config_type == 'Aurora'
  - changes[1].external_id == 'db-instance-2'
  - changes[1].change_type == 'Failover'
  - summary.changes.scraped == 2
