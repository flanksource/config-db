spec:
  full: true
  file:
    - type: RDS
      id: $.external_id
      paths:
        - fixtures/data/metadata_only_with_config_type.json
pre_populate:
  configs:
    - config_class: Database
      type: Aurora
      external_id: ["db-instance-1"]
      config: '{"engine":"aurora-mysql","max_connections":100}'
assertions:
  - config == null
  - size(changes) == 1
  - changes[0].config_type == 'Aurora'
  - changes[0].external_id == 'db-instance-1'
  - changes[0].change_type == 'ParameterChange'
  - summary.changes.scraped == 1
