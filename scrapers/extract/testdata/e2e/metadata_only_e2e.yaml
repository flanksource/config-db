spec:
  full: true
  file:
    - type: RDS
      id: $.external_id
      paths:
        - fixtures/data/metadata_only_changes.json
pre_populate:
  configs:
    - config_class: Database
      type: RDS
      external_id: ["db-instance-1"]
      config: '{"instance_class":"db.t3.medium","max_connections":100}'
assertions:
  - config == null
  - size(changes) > 0
  - changes[0].change_type == 'ParameterChange'
  - summary.changes.scraped > 0
