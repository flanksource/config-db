input:
  config:
    name: Test Org
  access:
    - id: a2
      external_config_id:
        config_type: Org
        external_id: org-1
      role: admin
  roles:
    - name: Admin
      aliases: [admin]

pre_populate:
  configs:
    Org/org-1: "00000000-0000-0000-0000-aaaaaaaaaaaa"
expected:
  config_access:
    - id: a2
      external_role_aliases: [admin]
  external_roles:
    - name: Admin
      aliases: [admin]
assertions:
  - size(config_access) == 1
  - config_access[0].external_role_aliases == ['admin']
  - size(external_roles) == 1
  - external_roles[0].name == 'Admin'
  - summary.config_access.scraped == 1
  - summary.config_access.skipped == 0
  - summary.roles.scraped == 1
