input:
  changes:
    - external_id: vm-1
      config_type: VM
      external_change_id: chg-1
      change_type: diff
      action: Updated
      summary: "disk resized"
    - external_change_id: chg-2
      change_type: RunAction
      action: ScaleUp
      summary: "replicas increased"
assertions:
  - size(changes) == 1
  - changes[0].external_id == 'vm-1'
  - changes[0].config_type == 'VM'
  - summary.changes.scraped == 2
  - summary.changes.skipped == 1
  - size(warnings) == 1
  - warnings[0].error == 'change missing external_id'
