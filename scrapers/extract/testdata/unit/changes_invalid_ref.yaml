input:
  changes:
    - config_type: Deployment
      external_change_id: chg-1
      change_type: diff
      summary: "has type but no id"
    - external_id: "app-2"
      external_change_id: chg-2
      change_type: diff
      summary: "valid ref (type optional)"
assertions:
  - size(changes) == 1
  - changes[0].external_id == 'app-2'
  - summary.changes.scraped == 2
  - summary.changes.skipped == 1
  - size(warnings) == 1
  - warnings[0].error == 'change missing external_id'
