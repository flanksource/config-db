input:
  external_id: db-instance-1
  config_type: RDS
  changes:
    - external_change_id: chg-001
      change_type: ParameterChange
      action: Updated
      summary: "max_connections changed from 100 to 200"
      severity: low
    - external_change_id: chg-002
      change_type: ScaleUp
      action: Resize
      summary: "instance class db.t3.medium -> db.t3.large"
      severity: medium
    - external_id: other-db
      config_type: Aurora
      external_change_id: chg-003
      change_type: Failover
      action: Failover
      summary: "failover to replica"
assertions:
  - config == null
  - size(changes) == 3
  - changes[0].external_id == 'db-instance-1'
  - changes[0].config_type == 'RDS'
  - changes[0].change_type == 'ParameterChange'
  - changes[0].severity == 'low'
  - changes[1].external_id == 'db-instance-1'
  - changes[1].config_type == 'RDS'
  - changes[1].change_type == 'ScaleUp'
  - changes[1].severity == 'medium'
  # change with its own external_id/config_type keeps them
  - changes[2].external_id == 'other-db'
  - changes[2].config_type == 'Aurora'
  - changes[2].change_type == 'Failover'
  - summary.changes.scraped == 3
