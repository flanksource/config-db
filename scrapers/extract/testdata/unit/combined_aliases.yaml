input:
  config:
    name: Test Org
  config_access:
    - id: access-005
      external_config_id:
        config_type: Organization
        external_id: test-org
      external_user_aliases: [alice, "alice@example.com"]
      external_role_aliases: [admin, owner]
      external_group_aliases: [admins, super-users]
pre_populate:
  configs:
    Organization/test-org: "00000000-0000-0000-0000-aaaaaaaaaaaa"
assertions:
  - size(config_access) == 1
  - config_access[0].id == 'access-005'
  - config_access[0].external_user_aliases == ['alice', 'alice@example.com']
  - config_access[0].external_role_aliases == ['admin', 'owner']
  - config_access[0].external_group_aliases == ['admins', 'super-users']
