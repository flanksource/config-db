input:
  config:
    name: Test Org
  config_access:
    - id: access-001
      external_config_id:
        config_type: Organization
        external_id: test-org
      external_user_aliases: [alice, "alice@example.com"]
    - id: access-002
      external_config_id:
        config_type: Organization
        external_id: test-org
      external_user_aliases: [bob]

pre_populate:
  configs:
    Organization/test-org: "00000000-0000-0000-0000-aaaaaaaaaaaa"
assertions:
  - size(config_access) == 2
  - config_access[0].id == 'access-001'
  - config_access[0].external_user_aliases == ['alice', 'alice@example.com']
  - config_access[1].id == 'access-002'
  - config_access[1].external_user_aliases == ['bob']
