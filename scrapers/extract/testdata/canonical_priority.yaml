input:
  config_access:
    - id: canonical
      external_config_id:
        config_type: Org
        external_id: org-1
      external_user_aliases: [alice]
  access:
    - id: alias
      external_config_id:
        config_type: Org
        external_id: org-1
      external_user_aliases: [bob]

pre_populate:
  configs:
    Org/org-1: "00000000-0000-0000-0000-aaaaaaaaaaaa"
assertions:
  - size(config_access) == 1
  - config_access[0].id == 'canonical'
