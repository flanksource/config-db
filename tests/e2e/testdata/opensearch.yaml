apiVersion: configs.flanksource.com/v1
kind: ScrapeConfig
metadata:
  name: opensearch
  uid: a49e46cd-7008-4bfc-a82d-9c930a84531f
  namespace: default
spec:
  full: true
  logs:
    - id: app-config-changes
      type: logs
      opensearch:
        address: http://localhost:9200
        index: app-logs
        query: |
          {
            "query": {
              "match": {
                "job": "app"
              }
            }
          }
        size: 50
        from: 24h
      transform:
        expr: |
          dyn(config.logs).map(line, {
            "changes": [
              {
                "external_change_id": line.hash,
                "change_type": "ConfigReload",
                "external_id": "45c381f0-7f73-40d3-88f3-5653a7c518d1",
                "config_type": "Database::MySQL",
                "created_at": line.firstObserved,
                "summary": line.message,
                "scraper_id": "all"
              }
            ]
          }).toJSON()
