on:
  pull_request:

name: Benchmark

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  bench:
    if: ${{ !github.event.pull_request.head.repo.fork }}
    name: Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BENCH_SIZES: 250,1000
      BENCH_PPROF_TARGET: BenchSaveResultsUpdateChanged
      BENCH_PPROF_SIZES: 3000
      BENCH_PPROF_TIME: 3x
    steps:
      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v5
        with:
          go-version: 1.25.x
          cache: false

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Post "benchmark running" comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- benchstat-report -->';
            const body = [
              marker,
              'Benchmark run in progress.',
              '',
              `Base: \`${{ github.event.pull_request.base.sha }}\``,
              `Head: \`${{ github.event.pull_request.head.sha }}\``,
              '',
              'This comment will be updated when benchmarks complete.',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || '').includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Install benchstat
        run: |
          GOBIN="$PWD/.bin" go install golang.org/x/perf/cmd/benchstat@latest
          echo "$PWD/.bin" >> "$GITHUB_PATH"

      - name: Prepare base worktree
        run: |
          mkdir -p .bench
          git worktree add .bench/base "${{ github.event.pull_request.base.sha }}"

          # Run the benchmark suite from HEAD for both base and head commits.
          # This ensures benchmark definitions are identical across both runs.
          if [ -d .bench/base/bench ]; then
            mv .bench/base/bench .bench/base/bench.base
          fi
          cp -R bench .bench/base/bench

      - name: Benchmark base
        run: |
          cd .bench/base
          # benchstat recommends >= 10 runs for stronger significance.
          # We use -count=6 to keep PR runtime reasonable.
          CONFIG_DB_BENCH_SIZES="${BENCH_SIZES}" \
            go test -run=^$ -bench=. -count=6 -timeout 20m ./bench | tee "$GITHUB_WORKSPACE/bench-base.txt"

      - name: Benchmark head
        run: |
          # benchstat recommends >= 10 runs for stronger significance.
          # We use -count=6 to keep PR runtime reasonable.
          CONFIG_DB_BENCH_SIZES="${BENCH_SIZES}" \
            go test -run=^$ -bench=. -count=6 -timeout 20m ./bench | tee bench-head.txt

      - name: Profile benchmark base (pprof)
        run: |
          cd .bench/base
          CONFIG_DB_BENCH_SIZES="${BENCH_PPROF_SIZES}" \
            go test -run=^$ -bench="${BENCH_PPROF_TARGET}" -benchtime="${BENCH_PPROF_TIME}" -count=1 -timeout 30m \
            -cpuprofile "$GITHUB_WORKSPACE/bench-base-cpu.pprof" \
            -memprofile "$GITHUB_WORKSPACE/bench-base-mem.pprof" \
            ./bench | tee "$GITHUB_WORKSPACE/bench-base-pprof.txt"

      - name: Profile benchmark head (pprof)
        run: |
          CONFIG_DB_BENCH_SIZES="${BENCH_PPROF_SIZES}" \
            go test -run=^$ -bench="${BENCH_PPROF_TARGET}" -benchtime="${BENCH_PPROF_TIME}" -count=1 -timeout 30m \
            -cpuprofile bench-head-cpu.pprof \
            -memprofile bench-head-mem.pprof \
            ./bench | tee bench-head-pprof.txt

      - name: Generate pprof diffs and hotspots
        run: |
          TOP=5 ./.github/scripts/generate-pprof-hotspots.sh \
            bench-base-cpu.pprof \
            bench-head-cpu.pprof \
            bench-base-mem.pprof \
            bench-head-mem.pprof \
            .

      - name: Compare
        run: |
          benchstat bench-base.txt bench-head.txt > benchstat.txt

          # Generate summary (do not fail this step; checked later with threshold)
          python3 .github/scripts/benchstat-summary.py benchstat.txt > bench-summary.md || true

          {
            echo "<!-- benchstat-report -->"
            echo "## Benchstat"
            echo ""
            echo "Base: \`${{ github.event.pull_request.base.sha }}\`"
            echo "Head: \`${{ github.event.pull_request.head.sha }}\`"
            echo ""
            cat bench-summary.md
            echo ""
            echo '<details>'
            echo '<summary>Full benchstat output</summary>'
            echo ""
            echo '```text'
            cat benchstat.txt
            echo '```'
            echo ""
            echo '</details>'
            echo ""
            echo "## pprof diff (targeted benchmark)"
            echo ""
            echo "Target regex: \`${BENCH_PPROF_TARGET}\`"
            echo "Benchtime: \`${BENCH_PPROF_TIME}\`"
            echo "Sizes: \`${BENCH_PPROF_SIZES}\`"
            echo ""
            echo "### CPU hotspots (project code, sorted by cumulative delta)"
            cat pprof-cpu-hotspots.md
            echo ""
            echo "### Memory hotspots (alloc_space, project code, sorted by cumulative delta)"
            cat pprof-mem-hotspots.md
            echo ""
            echo '<details>'
            echo '<summary>CPU hotspot line-level diff</summary>'
            echo ""
            cat pprof-cpu-hot-lines.txt
            echo ""
            echo '</details>'
            echo ""
            echo '<details>'
            echo '<summary>Memory hotspot line-level diff (alloc_space)</summary>'
            echo ""
            cat pprof-mem-hot-lines.txt
            echo ""
            echo '</details>'
            echo ""
            echo '<details>'
            echo '<summary>Raw CPU diff output</summary>'
            echo ""
            echo '```text'
            cat pprof-cpu-diff-cum.txt
            echo '```'
            echo ""
            echo '</details>'
            echo ""
            echo '<details>'
            echo '<summary>Raw memory diff output (alloc_space)</summary>'
            echo ""
            echo '```text'
            cat pprof-alloc-space-diff-cum.txt
            echo '```'
            echo ""
            echo '</details>'
          } > bench-report.md

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: benchmark-results
          path: |
            bench-base.txt
            bench-head.txt
            bench-base-pprof.txt
            bench-head-pprof.txt
            bench-base-cpu.pprof
            bench-head-cpu.pprof
            bench-base-mem.pprof
            bench-head-mem.pprof
            benchstat.txt
            pprof-cpu-diff.txt
            pprof-cpu-diff-cum.txt
            pprof-alloc-space-diff.txt
            pprof-alloc-space-diff-cum.txt
            pprof-alloc-objects-diff.txt
            pprof-cpu-hot-functions.txt
            pprof-mem-hot-functions.txt
            pprof-cpu-hotspots.md
            pprof-mem-hotspots.md
            pprof-cpu-hot-lines.txt
            pprof-mem-hot-lines.txt
            bench-report.md
          retention-days: 14

      - name: Post report to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('bench-report.md', 'utf8');
            const marker = '<!-- benchstat-report -->';

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(c => (c.body || '').includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Check for regressions
        run: python3 .github/scripts/benchstat-summary.py --threshold 5 benchstat.txt > /dev/null
