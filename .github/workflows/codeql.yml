# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: "CodeQL"
on:
  # FIXME disable codeql for now as it does not complete due to complile time of Azure SDK's
  # push:
  #   branches: ["main"]
  #   paths:
  #     - "**.go"
  # pull_request:
  #   branches: ["main"]
  #   paths:
  #     - "**.go"
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-8core
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["go"]
        # CodeQL supports [ $supported-codeql-languages ]
        # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.25.x

      # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        with:
          languages: go
          dependency-caching: true

      # Build with slim tag to exclude heavy cloud provider dependencies (AWS/Azure/GCP SDKs)
      - name: Build
        run: go build -tags slim ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        with:
          category: "/language:${{matrix.language}}"
