name: Gavel
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gavel:
    permissions:
      contents: read
      pull-requests: write
      issues: write
    name: gavel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version: 1.26.x

      - name: Cache Go modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Advisory initially: existing test.yml / lint.yml remain the blocking gates.
      # Flip fail-on-error to "true" after a few PRs confirm the output is reliable.
      - uses: flanksource/gavel@main
        with:
          args: test --lint
          version: latest
          comment: "true"
          comment-header: gavel
          fail-on-error: "false"
          artifact-name: gavel-results
