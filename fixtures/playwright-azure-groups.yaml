apiVersion: configs.flanksource.com/v1
kind: ScrapeConfig
metadata:
  name: azure-group-members
  annotations:
    playwright.userDataDir: /tmp/playwright-azure
spec:
  schedule: "@every 6h"
  playwright:
    - type: Azure::Group::MemberScreenshot
      id: $.groupId
      name: $.groupName
      trace:
        har: true
        domains:
          - "*.azure.com"
          - "*.microsoft.com"
          - "*.microsoftonline.com"
          - "*.windows.net"
          - "*.live.com"
        video: on-error
      login:
        browser:
          connection: connection://default/my-azure
          headless: false
      timeout: 600
      query:
        - path: groups.json
          types:
            - Azure::Group
      script: |
        const { boot } = require('./playwright-boot');
        const fs = require('fs');

        let ctx: any;
        async function main() {
          ctx = await boot();
          const { page, queryDir, log, screenshot, appendChange, writeOutput, checkLogin, close } = ctx;

          const groups = JSON.parse(fs.readFileSync(`${queryDir}/groups.json`, 'utf-8'));
          log(`loaded ${groups.length} Azure::Group config items`);

          await checkLogin('https://portal.azure.com/');

          // The Azure portal is a SPA whose hash router is registered by lazily-loaded
          // extensions (Microsoft_AAD_IAM among them). domcontentloaded fires long before
          // those extensions are wired up, so deep-linking immediately after navigation
          // produces an "unknown route" fallback to #home. The avatar menu is the latest
          // chrome element to mount and is a reliable signal that route handlers are live.
          await page.waitForSelector('#fxs-avatarmenu, [data-telemetryname="AvatarMenuButton"], button[aria-label*="Account manager"]', { timeout: 60000 }).catch(() => {});
          await page.waitForTimeout(3000);

          for (const group of groups) {
            const config = typeof group.config === 'string' ? JSON.parse(group.config) : group.config;
            const groupId = config?.id || group.external_id?.[0] || group.id;
            const groupName = group.name || groupId;

            const url = `https://portal.azure.com/#view/Microsoft_AAD_IAM/GroupDetailsMenuBlade/~/Members/groupId/${groupId}/menuId/`;
            log(`navigating to group: ${groupName} (${groupId})`);

            // Drive the navigation from inside the portal's own JS context. For a
            // same-document hash change, assigning location.href fires hashchange
            // against the SPA's already-wired router; page.goto via CDP can take a
            // path that the portal silently falls back from.
            await page.evaluate((u) => { window.location.href = u; }, url);
            await page.waitForTimeout(2000);
            await page.waitForSelector('[class*="member"], [data-automationid="ListCell"]', { timeout: 30000 }).catch(() => {});

            const path = await screenshot(groupName, { watermark: `${groupName} — Members` });
            appendChange({
              change_type: 'GroupMemberScreenshot',
              id: `group-members-${groupId}`,
              config_id: group.id,
              summary: `Member list screenshot for ${groupName}`,
              screenshot: path,
            });
          }

          writeOutput(null);
          await close();
        }

        main().catch(async (e) => {
          process.stderr.write(e.stack + '\n');
          if (ctx) {
            await ctx.screenshot('error').catch(() => {});
            await ctx.close({ error: true });
          }
          process.exit(1);
        });
