apiVersion: configs.flanksource.com/v1
kind: ScrapeConfig
metadata:
  name: aws-backup-console-screenshots
  annotations:
    playwright.keep: "true"
spec:
  schedule: "@every 6h"
  playwright:
    - type: AWS::Backup::BackupVault
      id: $.vaultName
      name: $.vaultName
      trace:
        har: true
        domains:
          - "!*global.console.aws.amazon.com*"
          - "!*uxc.*.api.aws*"
          - "!*.prod.pl.panorama.console*"
          - "!*recommendations.widget.console.aws.amazon.com*"
          - "!*telemetry.console.api.aws*"
        video: on-error
      login:
        aws:
          #          connection: connection://aws/production
          login: playwright
          region:
            - eu-west-1
          sessionDuration: 3600
      headless: true
      timeout: 600
      script: |
        const { boot } = require('./playwright-boot');

        let ctx: any;
        async function main() {
          ctx = await boot();
          const { page, log, screenshot, appendChange, writeOutput, close } = ctx;
          const region = process.env.AWS_REGION || 'eu-west-1';

          await ctx.checkLogin(`https://${region}.console.aws.amazon.com/console/home?region=${region}`);

          // Navigate to AWS Backup dashboard
          const backupUrl = `https://${region}.console.aws.amazon.com/backup/home?region=${region}#/backupvaults`;
          log(`navigating to Backup vaults: ${backupUrl}`);
          await page.goto(backupUrl, { waitUntil: 'domcontentloaded' });
          await page.waitForSelector('table', { timeout: 30000 });

          await screenshot('backup_vaults', { watermark: `AWS Backup vaults in ${region}` });

          // Extract vault names from the table
          const vaults: string[] = await page.evaluate(() => {
            const rows = document.querySelectorAll('table tbody tr');
            return Array.from(rows).map(row => {
              const link = row.querySelector('a');
              return link?.textContent?.trim() || '';
            }).filter(Boolean);
          });

          log(`found ${vaults.length} backup vaults: ${vaults.join(', ')}`);

          for (const vault of vaults) {
            const vaultUrl = `https://${region}.console.aws.amazon.com/backup/home?region=${region}#/backupvaults/details/${encodeURIComponent(vault)}`;
            log(`navigating to vault: ${vault}`);

            await page.goto('about:blank');
            await page.goto(vaultUrl, { waitUntil: 'domcontentloaded' });

            await page.waitForFunction(
              (name: string) => {
                const el = document.querySelectorAll('h1[data-awsui-analytics-label] > span[class*="awsui_heading-text"]')[0];
                return el?.textContent?.includes(name);
              },
              vault,
              { timeout: 30000 }
            ).catch(() => {});
            await page.waitForSelector('table', { timeout: 15000 }).catch(() => {});

            const path = await screenshot(vault, { watermark: `${vault} — Backup Vault` });
            appendChange({
              change_type: 'AWSBackupScreenshot',
              id: `backup-vault-${vault}`,
              config_type: 'AWS::Backup::BackupVault',
              config_id: vault,
              summary: `Backup vault screenshot for ${vault}`,
              screenshot: path,
            });

            // Navigate to backup plans tab if available
            const plansUrl = `https://${region}.console.aws.amazon.com/backup/home?region=${region}#/backupvaults/details/${encodeURIComponent(vault)}/recovery-points`;
            await page.goto('about:blank');
            await page.goto(plansUrl, { waitUntil: 'domcontentloaded' });
            await page.waitForSelector('table', { timeout: 15000 }).catch(() => {});

            const rpPath = await screenshot(`${vault}-recovery-points`, { watermark: `${vault} — Recovery Points` });
            appendChange({
              change_type: 'AWSBackupScreenshot',
              id: `backup-rp-${vault}`,
              config_type: 'AWS::Backup::BackupVault',
              config_id: vault,
              summary: `Recovery points screenshot for ${vault}`,
              screenshot: rpPath,
            });
          }

          // Navigate to Backup plans
          const plansUrl = `https://${region}.console.aws.amazon.com/backup/home?region=${region}#/backupplans`;
          log(`navigating to Backup plans`);
          await page.goto(plansUrl, { waitUntil: 'domcontentloaded' });
          await page.waitForSelector('table', { timeout: 30000 }).catch(() => {});
          await screenshot('backup_plans', { watermark: `AWS Backup plans in ${region}` });

          // Navigate to Backup jobs
          const jobsUrl = `https://${region}.console.aws.amazon.com/backup/home?region=${region}#/jobs`;
          log(`navigating to Backup jobs`);
          await page.goto(jobsUrl, { waitUntil: 'domcontentloaded' });
          await page.waitForSelector('table', { timeout: 30000 }).catch(() => {});
          await screenshot('backup_jobs', { watermark: `AWS Backup jobs in ${region}` });

          writeOutput(null);
          await close();
        }

        main().catch(async (e) => {
          process.stderr.write(e.stack + '\n');
          if (ctx) {
            await ctx.screenshot('error').catch(() => {});
            await ctx.close({ error: true });
          }
          process.exit(1);
        });
